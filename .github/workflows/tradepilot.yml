name: TradePilot cycle

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

# Never let two cycles overlap (a queued run waits for the current one).
concurrency:
  group: tradepilot-cycle
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (includes the committed SQLite DB)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run one cycle (paper trading only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional: enables the Grok X-sentiment layer when set.
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          # Optional: Binance Spot TESTNET keys (fake funds). Only used when
          # the repo variable TRADEPILOT_EXECUTOR is set to "testnet".
          EXECUTOR: ${{ vars.TRADEPILOT_EXECUTOR }}
          BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
          BINANCE_TESTNET_API_SECRET: ${{ secrets.BINANCE_TESTNET_API_SECRET }}
        run: npm run cycle

      - name: Generate report
        run: npm run report

      - name: Commit updated DB and report
        run: |
          git config user.name "tradepilot-bot"
          git config user.email "tradepilot-bot@users.noreply.github.com"
          git add data/tradepilot.db reports/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "tradepilot: cycle $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          fi
